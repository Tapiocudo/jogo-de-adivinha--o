<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Adivinhação</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
  <audio id="somAcerto" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="somErro" src="https://assets.mixkit.co/sfx/preview/mixkit-error-126.mp3"></audio>
</head>
<body>

  <div class="container">
    <h1>🎯 Jogo de Adivinhação</h1>

    <p>Tente adivinhar o número entre 1 e 100!</p>

    <input type="number" id="palpite" placeholder="Digite seu palpite">

    <button onclick="chutar()">Chutar</button>

    <p id="mensagem"></p>
    <p id="tentativas"></p>
  </div>
  <button onclick="reiniciarJogo()" id="reset" style="display:none;">
  🔄 Jogar novamente

  <h3>📜 Histórico de palpites:</h3>
<ul id="historico"></ul>


</button>
</body>
</html>
